<div class="container">
  <div class="card">

    <div class="card-header">
      <h2>Submit Your Details</h2>
      <p>Please fill in the fields below and click submit.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input
          id="firstName"
          formControlName="firstName"
          placeholder="Enter your first name"
          [class.invalid]="form.get('firstName')?.invalid && form.get('firstName')?.touched"
        />
        <span class="error"
          *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched">
          First name is required.
        </span>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input
          id="lastName"
          formControlName="lastName"
          placeholder="Enter your last name"
          [class.invalid]="form.get('lastName')?.invalid && form.get('lastName')?.touched"
        />
        <span class="error"
          *ngIf="form.get('lastName')?.invalid && form.get('lastName')?.touched">
          Last name is required.
        </span>
      </div>

      <button type="submit" [disabled]="form.invalid" [class.loading]="isLoading">
        {{ isLoading ? 'Submitting...' : 'Submit' }}
      </button>

    </form>

    <div class="message success" *ngIf="message && !isError">
      ✓ {{ message }}
    </div>

    <div class="message error-msg" *ngIf="message && isError">
      ✗ {{ message }}
    </div>

  </div>
</div>
